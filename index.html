<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>oL0adSide | IPA Signer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>oL0adSide</h1>
            <p>Professional IPA Signing Tool</p>
        </header>

        <main>
            <section class="upload-section">
                <div class="input-group">
                    <label for="ipa-file">Select IPA File</label>
                    <input type="file" id="ipa-file" accept=".ipa">
                </div>

                <div class="input-group">
                    <label for="p12-file">Select P12 Certificate</label>
                    <input type="file" id="p12-file" accept=".p12">
                </div>

                <div class="input-group">
                    <label for="mobileprovision">Select Mobileprovision</label>
                    <input type="file" id="mobileprovision" accept=".mobileprovision">
                </div>

                <div class="input-group">
                    <label for="password">Certificate Password</label>
                    <input type="password" id="password" placeholder="Enter password">
                </div>

                <button id="sign-button" class="btn-primary">Sign and Install</button>
            </section>

            <div id="status-console" class="console">
                <span class="dot"></span> Waiting for files...
            </div>
        </main>

        <footer>
            <p>&copy; 2026 oL0adSide Engine</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
